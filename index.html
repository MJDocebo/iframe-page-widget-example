<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docebo API Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h2>User Information</h2>
        <div id="data-container">
            <p><strong>Username:</strong> <span id="username">Loading...</span></p>
            <p><strong>User ID:</strong> <span id="user_id">Loading...</span></p>
            <hr>
            <p class="meta"><strong>Auth Code:</strong> <span id="auth_code">...</span></p>
            <p class="meta"><strong>Provided Hash:</strong> <span id="hash">...</span></p>
        </div>
        
        <div class="verification-section">
            <h3>1. Hash Verification</h3>
            <input type="password" id="salt_input" placeholder="Enter Salt Secret">
            <button id="verify_btn">Verify Hash</button>
            <div id="result_box" class="hidden">
                <p><strong>Calculated Hash:</strong> <br><span id="calc_hash_display" class="break-word"></span></p>
                <div id="status_message"></div>
            </div>
        </div>

        <div class="api-section">
            <h3>2. Fetch Transcript (API)</h3>
            <p class="instructions">Enter your OAuth App credentials to exchange the auth_code for a token and fetch completed courses.</p>
            <input type="text" id="client_id_input" placeholder="Client ID">
            <input type="password" id="client_secret_input" placeholder="Client Secret">
            <button id="fetch_api_btn">Fetch Completed Courses</button>
            
            <div id="api_status"></div>
            
            <ul id="course_list" class="hidden"></ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
